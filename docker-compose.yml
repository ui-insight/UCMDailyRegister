services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      MINDROUTER_API_KEY: ${MINDROUTER_API_KEY:-}
      MINDROUTER_ENDPOINT_URL: ${MINDROUTER_ENDPOINT_URL:-https://mindrouter.uidaho.edu/v1/chat/completions}
      MINDROUTER_MODEL: ${MINDROUTER_MODEL:-Qwen/Qwen3-32B}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: '${CORS_ORIGINS:?Set CORS_ORIGINS in .env}'
    volumes:
      - uploads:/app/uploads
    networks:
      - ucmnews-net
      - insight-db-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8001/api/v1/readyz\", timeout=3).status == 200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "${HOST_PORT:-9280}:80"
    depends_on:
      - backend
    networks:
      - ucmnews-net
    restart: unless-stopped

volumes:
  uploads:

networks:
  ucmnews-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-10.20.9.0/24}
  insight-db-net:
    external: true
